name: Daily Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      YT_DATA_API: ${{ secrets.YT_DATA_API }}

    steps:
      - name: Checkout repo
        uses: actions/checkout

      - name: Install uv
        uses: astral-sh/setup-uv

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Install local modules
        run: uv pip install -e .

      - name: Run full pipeline
        run: |
          uv run python main.py daily
          uv run python main.py match

      - name: Build versioned warehouse snapshot
        run: uv run python main.py publish

      - name: Upload warehouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-${{ github.run_id }}
          path: artifacts/warehouse/

name: Daily Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      YT_DATA_API: ${{ secrets.YT_DATA_API }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache DuckDB warehouse
        uses: actions/cache@v4
        id: cache
        with:
          path: data/warehouse.db
          key: duckdb-warehouse-${{ github.run_id }}
          restore-keys: |
            duckdb-warehouse-

      - name: Download previous warehouse artifact
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dawidd6/action-download-artifact@v9
        continue-on-error: true
        id: artifact
        with:
          name: warehouse-latest
          workflow: daily-pipeline.yml
          if_no_artifact_found: ignore

      - name: Restore warehouse.db
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "latest.db" ]; then
            mkdir -p data
            mv latest.db data/warehouse.db
            echo "Restored warehouse.db from artifact"
          elif [ -f "data/warehouse_seed.db" ]; then
            cp data/warehouse_seed.db data/warehouse.db
            echo "Bootstrapped warehouse.db from seed"
          else
            echo "No seed or artifact found — pipeline will create tables from scratch"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Install local modules
        run: uv pip install -e .

      - name: Run daily pipeline
        run: uv run python main.py daily

      - name: Run video-agent matching
        run: uv run python main.py match

      - name: Build versioned warehouse snapshot
        run: uv run python main.py publish

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-${{ github.run_id }}
          path: artifacts/warehouse/
          retention-days: 90

      - name: Upload latest artifact (for restore)
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-latest
          path: artifacts/warehouse/latest.db
          retention-days: 90
          overwrite: true
